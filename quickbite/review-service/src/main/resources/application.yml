server:
  forward-headers-strategy: framework
  port: 8088

spring:
  application:
    name: review-service
  datasource:
    url: jdbc:mysql://localhost:3306/quickbite_review?createDatabaseIfNotExist=true&useSSL=false
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

